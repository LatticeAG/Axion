name = "axion"
main = "src/proxy/index.ts"
compatibility_date = "2024-06-01"
compatibility_flags = ["nodejs_compat"]

# Durable Object binding for per-session belief timeline state.
[[durable_objects.bindings]]
name = "SESSION"
class_name = "SessionDurableObject"

# Migration for the Session Durable Object.
[[migrations]]
tag = "v1"
new_classes = ["SessionDurableObject"]

# Static assets for the dashboard (served by the Worker via the ASSETS binding).
[assets]
directory = "./src/dashboard"
binding = "ASSETS"

# Vars / secrets:
#   UPSTREAM_API_URL  - base URL of the model API (default OpenAI)
#   UPSTREAM_API_KEY  - optional; only used when the caller does not send
#                       Authorization / x-api-key. Prefer caller passthrough.
#                       Set with: wrangler secret put UPSTREAM_API_KEY
#                       Local: copy .dev.vars.example → .dev.vars
[vars]
UPSTREAM_API_URL = "https://api.openai.com"
